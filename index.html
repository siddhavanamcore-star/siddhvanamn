<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Jivant AI Core Engine</title>
    <style>
        body { background: #050505; color: #d4af37; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .portal { max-width: 800px; margin: auto; border: 1px solid #333; padding: 30px; border-radius: 8px; background: #0a0a0a; }
        h1 { text-align: center; letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; color: #aaa; margin-bottom: 5px; text-transform: uppercase; }
        select, textarea, input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 4px; box-sizing: border-box; }
        .row { display: flex; gap: 20px; }
        /* बटन को व्यवस्थित किया */
        .action-row { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 15px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .btn-main { background: #d4af37; color: #000; }
        .btn-preview { background: #222; color: #d4af37; border: 1px solid #d4af37; }
        
        #progress-bar { width: 100%; height: 10px; background: #222; margin-top: 10px; display: none; }
        #progress-fill { height: 100%; background: #d4af37; width: 0%; }
        
        /* Golden Chatbot */
        #chat-window { display: none; position: fixed; bottom: 80px; right: 30px; width: 300px; height: 400px; background: #1a1a1a; border: 2px solid #d4af37; border-radius: 10px; flex-direction: column; overflow: hidden; }
        .chat-header { background: #d4af37; padding: 10px; display: flex; justify-content: space-between; color: #000; font-weight: bold; }
        .chat-body { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 10px; font-size: 0.85rem; max-width: 85%; }
        .user { align-self: flex-end; background: #d4af37; color: #000; }
        .bot { align-self: flex-start; background: #333; color: #fff; }
        .droid-btn { position: fixed; bottom: 20px; right: 30px; cursor: pointer; font-size: 40px; }
    </style>
</head>
<body>

<div class="portal">
    <h1>JIVANT AI CORE ENGINE</h1>
    
    <div class="input-group">
        <label>LICENSE KEY</label>
        <input type="text" placeholder="Enter business key...">
    </div>

    <div class="input-group">
        <label>SELECT SCRIPT SIMULATION ENGINE</label>
        <select><option>Stillness Core (Spontaneous Calm)</option></select>
    </div>
    
    <div class="input-group">
        <label>CUSTOM COPYRIGHT EMBED</label>
        <input type="text" placeholder="Optional...">
    </div>
    
    <div class="input-group">
        <label>ENTER FULL SCRIPT / VISUAL PROMPT</label>
        <textarea rows="4"></textarea>
    </div><div class="input-group">
    <label>NATURE DESCRIPTION (SCENE ATMOSPHERE)</label>
    <textarea rows="2" placeholder="e.g., Mystic forest at dawn, cinematic lighting..."></textarea>
</div>

    <div class="row">
        <div class="input-group"><label>CAMERA PAN SHIFT</label><input type="number" value="0.50"></div>
        <div class="input-group"><label>AESTHETIC DENSITY</label><input type="number" value="2.50"></div>
    </div>

    <div class="input-group"><input type="checkbox"> <label style="display:inline;">ENABLE SIMULATION LOCK</label></div>
    
    <div class="action-row">
        <button class="btn-preview" onclick="previewRender()">5-SEC PREVIEW</button>
        <button class="btn-main" onclick="startRender()">INITIATE JIVANT RENDERING</button>
    </div>
    <div id="progress-bar"><div id="progress-fill"></div></div>

    <div class="licensing-section" style="border: 1px dashed #d4af37; padding: 20px; margin-top: 30px;">
        <h3 style="text-align:center; margin-top:0;">SOVEREIGN LICENSING GATEWAY</h3>
        <button style="width:100%; padding:10px; background:transparent; color:#d4af37; border:1px solid #d4af37; margin-bottom:10px;">GET ON-DEMAND CREDIT PACK</button>
        <button style="width:100%; padding:10px; background:transparent; color:#d4af37; border:1px solid #d4af37;">SUBSCRIBE TO CORPORATE NODE</button>
    </div>
</div>

<div class="droid-btn" onclick="toggleChat()">🤖</div>
<div id="chat-window">
    <div class="chat-header">Jivant Droid AI <span onclick="toggleChat()" style="cursor:pointer">✖</span></div>
    <div class="chat-body" id="chat-body">
        <div class="msg bot">Hello Creator! How can I assist you?</div>
        <div class="msg bot" style="cursor:pointer; color:#d4af37;" onclick="ask(1)">1. How to render?</div>
        <div class="msg bot" style="cursor:pointer; color:#d4af37;" onclick="ask(2)">2. What is Sim Lock?</div>
        <div class="msg bot" style="cursor:pointer; color:#d4af37;" onclick="ask(3)">3. Preview vs Render?</div>
    </div>
</div>

<script>
    function toggleChat() { 
        const w = document.getElementById('chat-window'); 
        w.style.display = (w.style.display === 'flex' ? 'none' : 'flex'); 
    }
    function ask(id) {
        const b = document.getElementById('chat-body');
        const q = ["How to render?", "What is Sim Lock?", "Preview vs Render?"];
        const a = ["Click Initiate after setting your parameters.", "Stabilizes the frame math.", "Preview renders 5 seconds for quality check; Render processes the full script."];
        b.innerHTML += `<div class="msg user">${q[id-1]}</div><div class="msg bot">${a[id-1]}</div>`;
        b.scrollTop = b.scrollHeight;
    }
    function previewRender() { alert("Preview mode: Rendering 5-second sample..."); }
    function startRender() {
        document.getElementById('progress-bar').style.display = 'block';
        let f = document.getElementById('progress-fill');
        let w = 0;
        let i = setInterval(() => {
            if (w >= 100) clearInterval(i);
            else { w++; f.style.width = w + '%'; }
        }, 30);
    }
</script>

</body>
</html>
